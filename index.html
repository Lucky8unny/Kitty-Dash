<body>

<h1>🐾 Kitty Dash</h1>
<div id="gameWrapper">
  <div id="ui">
    <span>⭐ <span id="scoreDisplay">0</span></span>
    <span id="powerBarWrap"><div id="powerBar"></div></span>
    <span id="speedDisplay" style="font-size:0.8rem;color:#c084fc">▶ x1.0</span>
    <span>🏆 Best: <span id="hiDisplay">0</span></span>
  </div>
  <canvas id="c" width="700" height="260"></canvas>
  <div id="overlay">
    <!-- Start panel -->
    <div id="startPanel">
      <h2>🐱 Kitty Dash</h2>
      <p>Press <b>Space</b> or <b>tap</b> to jump!<br>Double-jump is allowed ✨</p>
      <p class="sub">🟡 Coins = +10pts &nbsp;|&nbsp; ⚡ Stars = invincible!<br>🌵 Avoid the cacti!</p>
      <div class="toggle-row">
        <button id="musicToggle">🎵 Music: ON</button>
        <button id="sfxToggle">🔊 SFX: ON</button>
      </div>
      <button id="startBtn" class="play-btn">Play!</button>
    </div>
    <!-- Game over panel (hidden initially) -->
    <div id="gameOverPanel" style="display:none;flex-direction:column;align-items:center;gap:8px">
      <h2>😿 Oops!</h2>
      <p>You scored <b id="finalScore" style="color:#ffd700;font-size:1.4rem">0</b> points!</p>
      <p class="sub">Best: <span id="bestScore">0</span></p>
      <button id="restartBtn">Try Again</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 50;

// --- Palette ---
const SKY_TOP = '#1a0a2e', SKY_BOT = '#2d1150';
const GROUND_COLOR = '#3d1f6e';
const GROUND_LINE = '#6a3aaa';

// --- State ---
let state = 'idle'; // idle | playing | dead
let score = 0, hiScore = 0, frame = 0, speed = 4.5;
let powerActive = false, powerTimer = 0;
const POWER_DURATION = 300;

let lastTime = 0;
const FIXED_STEP = 1000 / 60; // 60fps baseline

// --- Stars background ---
const stars = Array.from({length: 60}, () => ({
  x: Math.random() * W,
  y: Math.random() * (GROUND - 40),
  r: Math.random() * 1.5 + 0.3,
  twinkle: Math.random() * Math.PI * 2
}));

// --- Kitten ---
// cat.y = top of sprite; rests at GROUND - cat.h
const CAT_H = 40, CAT_W = 60;
const CAT_FLOOR = GROUND - CAT_H;
const cat = {
  x: 90, y: CAT_FLOOR, w: CAT_W, h: CAT_H,
  vy: 0, jumps: 0,
  maxJumps: 2,
  get grounded() { return this.y >= CAT_FLOOR; }
};

function jump() {
  if (cat.jumps < cat.maxJumps) {
    cat.vy = -13;
    cat.jumps++;
    sfxJump();
    spawnJumpParticles();
  }
}

// --- Obstacles ---
let obstacles = [];
let obstacleCooldown = 80;

function spawnObstacle() {
  const h = 28 + Math.random() * 28;
  obstacles.push({ x: W + 10, y: GROUND - h, w: 22, h });
}

// --- Coins ---
let coins = [];
let coinTimer = 0, coinInterval = 70;

function spawnCoin() {
  const floatH = [GROUND - 30, GROUND - 60, GROUND - 90];
  coins.push({
    x: W + 10,
    y: floatH[Math.floor(Math.random() * floatH.length)],
    r: 10, collected: false
  });
}

// --- Power-ups ---
let powers = [];
let powerSpawnTimer = 0, powerSpawnInterval = 380;

function spawnPower() {
  powers.push({
    x: W + 10,
    y: GROUND - 75,
    r: 12, collected: false
  });
}

// --- Particles ---
let particles = [];

function spawnJumpParticles() {
  for (let i = 0; i < 7; i++) {
    particles.push({
      x: cat.x + cat.w / 2,
      y: cat.y + cat.h,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * -2,
      life: 30, maxLife: 30,
      color: '#ff9edf'
    });
  }
}

function spawnCollectParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 2),
      vy: Math.sin(angle) * (2 + Math.random() * 2),
      life: 40, maxLife: 40,
      color
    });
  }
}


// --- Music & SFX settings ---
let musicOn = true;
let sfxOn   = true;

// --- Music (real MP3, base64 embedded) ---
const bgAudio = new Audio('music.mp3');
bgAudio.loop = true;
bgAudio.volume = 0.7;

function startMusic() {
  if (!musicOn) return;
  bgAudio.currentTime = 0;
  bgAudio.play().catch(() => {});
}

function stopMusic() {
  bgAudio.pause();
  bgAudio.currentTime = 0;
}

// --- Audio (Web Audio API) ---
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, vol=0.18, fadeStart=0.05) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    o.start(ac.currentTime); o.stop(ac.currentTime + duration);
  } catch(e) {}
}
function sfxJump()    { if(!sfxOn) return; playTone(520, 'sine',    0.18, 0.14); playTone(700, 'sine', 0.10, 0.08); }
function sfxCoin()    { if(!sfxOn) return; playTone(880, 'sine',    0.10, 0.18); playTone(1100,'sine', 0.08, 0.12); }
function sfxPower()   { if(!sfxOn) return;
  [440,550,660,880].forEach((f,i) => {
    try {
      const ac = getAudio();
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(f, ac.currentTime + i*0.07);
      g.gain.setValueAtTime(0.15, ac.currentTime + i*0.07);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i*0.07 + 0.18);
      o.start(ac.currentTime + i*0.07); o.stop(ac.currentTime + i*0.07 + 0.2);
    } catch(e) {}
  });
}
function sfxDie() { if(!sfxOn) return;
  [440,330,220,160].forEach((f,i) => {
    try {
      const ac = getAudio();
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(f, ac.currentTime + i*0.1);
      g.gain.setValueAtTime(0.12, ac.currentTime + i*0.1);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i*0.1 + 0.2);
      o.start(ac.currentTime + i*0.1); o.stop(ac.currentTime + i*0.1 + 0.25);
    } catch(e) {}
  });
}

// --- Difficulty ---
//Helper Functions
function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function resetObstacleCooldown() {
  // Base gap shrinks as speed increases
  const speedRatio = speed / 4.5; // 1.0 at starting speed
  const minGap = Math.max(22, 52 - (speedRatio - 1) * 12);
  const maxGap = Math.max(minGap + 12, 105 - (speedRatio - 1) * 18);

  let nextGap = rand(minGap, maxGap);

  // Occasional short follow-up cactus for more natural pressure
  if (Math.random() < 0.22) {
    nextGap *= rand(0.60, 0.82);
  }

  // Occasional breather
  if (Math.random() < 0.12) {
    nextGap *= rand(1.15, 1.35);
  }

  obstacleCooldown = nextGap;
}
// Speed tiers: smooth exponential ramp, caps at ~12
function getSpeed() {
  return Math.min(4.5 + Math.pow(score, 0.55) * 0.22, 12);
}
// Obstacle interval: base shrinks with score, but variance *grows* — more unpredictable over time
function getObstacleInterval() {
  // Base interval shrinks as score climbs, floored at 52 frames (fair minimum gap)
  const base = Math.max(52, 120 - score * 0.10);
  // Variance grows over time so gaps feel increasingly unpredictable
  const variance = Math.min(90, 18 + score * 0.18);
  // Roll is biased slightly positive so long gaps are more common than impossible short ones
  const roll = (Math.random() + Math.random()) / 2; // triangular distribution 0-1, peak ~0.5
  // Occasional dramatic long pause (~10% chance): adds surprise breathing room
  if (Math.random() < 0.10) return base + variance * 1.4;
  return base + roll * variance - variance * 0.20;
}


function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
  grad.addColorStop(0, SKY_TOP);
  grad.addColorStop(1, SKY_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.twinkle += 0.04;
    const alpha = 0.4 + 0.4 * Math.sin(s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,220,255,${alpha})`;
    ctx.fill();
  });

  // Ground
  ctx.fillStyle = GROUND_COLOR;
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = GROUND_LINE;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();
}

// --- Sprite sheet ---
// Strip: 2814x384, 6 frames each 469x384, ground-anchored
// Layout: F0,F1,F2 = run | F3,F4,F5 = leap
// Strict grid: sx = fi * 469, sy = 0. Fixed world position, no per-frame offsets.
const SHEET_FW = 469;
const SHEET_FH = 384;
// Render scale: 469/6.5 ≈ 72px wide, 384/6.5 ≈ 59px tall
const SPRITE_FEET_PAD = 8; // px: lower sprite so paws sit on ground
const SPRITE_W = 72
const SPRITE_H = 59;

const catSheet = new Image();
catSheet.src = 'kitten-sprite.png';

function drawKitten() {
  if (!catSheet.complete) return;
  const inv      = powerActive;
  const hue      = (frame * 5) % 360;
  const airborne = cat.y < CAT_FLOOR - 2;

  // Run frames F0-F2 are in row 0 (sy=0), Leap frames F3-F5 are in row 1 (sy=SHEET_FH)
  let fi, sy;
  if (airborne) {
    sy = SHEET_FH; // row 1
    if      (cat.vy < -5) fi = 0;
    else if (cat.vy <  3) fi = 1;
    else                  fi = 2;
  } else {
    sy = 0; // row 0
    fi = [0,1,2,1][Math.floor(frame / 7) % 4];
  }

  const sx    = fi * SHEET_FW;
  const drawX = cat.x;
  const drawY = cat.y + cat.h - SPRITE_H + SPRITE_FEET_PAD;

  ctx.save();
  ctx.imageSmoothingEnabled = false;

  if (inv && Math.floor(frame / 3) % 2 === 0) {
    if (!drawKitten._off) {
      drawKitten._off = document.createElement('canvas');
      drawKitten._off.width = SPRITE_W; drawKitten._off.height = SPRITE_H;
    }
    const off = drawKitten._off;
    const oc = off.getContext('2d');
    oc.clearRect(0, 0, SPRITE_W, SPRITE_H);
    oc.imageSmoothingEnabled = false;
    oc.drawImage(catSheet, sx, sy, SHEET_FW, SHEET_FH, 0, 0, SPRITE_W, SPRITE_H);
    oc.globalCompositeOperation = 'source-in';
    oc.fillStyle = `hsl(${hue},100%,65%)`;
    oc.globalAlpha = 0.55;
    oc.fillRect(0, 0, SPRITE_W, SPRITE_H);
    ctx.shadowColor = `hsl(${hue},100%,65%)`;
    ctx.shadowBlur = 14;
    ctx.drawImage(catSheet, sx, sy, SHEET_FW, SHEET_FH, drawX, drawY, SPRITE_W, SPRITE_H);
    ctx.drawImage(off, drawX, drawY);
  } else {
    ctx.drawImage(catSheet, sx, sy, SHEET_FW, SHEET_FH, drawX, drawY, SPRITE_W, SPRITE_H);
  }
  ctx.restore();
}





function drawObstacles() {
  obstacles.forEach(o => {
    // Cactus shape
    ctx.fillStyle = '#2ecc71';
    ctx.strokeStyle = '#27ae60';
    ctx.lineWidth = 1.5;

    // Main trunk
    ctx.beginPath();
    ctx.roundRect(o.x + o.w*0.3, o.y, o.w*0.4, o.h, 4);
    ctx.fill(); ctx.stroke();

    // Left arm
    if (o.h > 35) {
      ctx.beginPath();
      ctx.roundRect(o.x, o.y + o.h*0.3, o.w*0.35, o.w*0.35, 4);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.roundRect(o.x, o.y + o.h*0.1, o.w*0.22, o.h*0.25, 4);
      ctx.fill(); ctx.stroke();
    }

    // Spikes
    ctx.fillStyle = '#27ae60';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(o.x + o.w*0.5, o.y + (i * o.h * 0.3), 2, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

function drawCoins() {
  coins.forEach(c => {
    if (c.collected) return;
    const pulse = 1 + 0.1 * Math.sin(frame * 0.15 + c.x);
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(pulse, pulse);

    // Coin glow
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, c.r * 1.5);
    g.addColorStop(0, '#ffe066');
    g.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, c.r * 1.5, 0, Math.PI*2); ctx.fill();

    // Coin body
    ctx.fillStyle = '#ffd700';
    ctx.strokeStyle = '#e6a800';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    // $ sign
    ctx.fillStyle = '#c8880a';
    ctx.font = `bold ${c.r * 1.1}px Fredoka One, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', 0, 0);

    ctx.restore();
  });
}

function drawPowers() {
  powers.forEach(p => {
    if (p.collected) return;
    const pulse = 1 + 0.15 * Math.sin(frame * 0.2 + p.x);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(pulse, pulse);

    // Star glow
    ctx.shadowColor = '#ffdd00';
    ctx.shadowBlur = 16;

    // Star shape
    ctx.fillStyle = '#ffee44';
    drawStar(ctx, 0, 0, 5, p.r, p.r * 0.5);

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = `${p.r}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡', 0, 1);

    ctx.restore();
  });
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = (Math.PI / 2) * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * alpha, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPowerOverlay() {
  if (!powerActive) return;
  const hue = (frame * 4) % 360;
  ctx.save();
  ctx.globalAlpha = 0.08 + 0.04 * Math.sin(frame * 0.3);
  ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function drawScore() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('hiDisplay').textContent = hiScore;
  document.getElementById('speedDisplay').textContent = `▶ x${(speed/4.5).toFixed(1)}`;
}

// --- Collision ---
function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function circleRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX, dy = cy - nearY;
  return dx*dx + dy*dy < cr*cr;
}

// --- Game loop ---
function update(dt = 1) {
  if (state !== 'playing') return;

  frame += dt;
  speed = getSpeed();

  // Kitten physics
  cat.vy += 0.72 * dt;
  cat.y += cat.vy * dt;
  if (cat.y >= CAT_FLOOR) {
    cat.y = CAT_FLOOR;
    cat.vy = 0;
    cat.jumps = 0;
  }

  // Obstacles
obstacleCooldown -= dt;
if (obstacleCooldown <= 0) {
  spawnObstacle();
  resetObstacleCooldown();
}
obstacles.forEach(o => o.x -= speed * dt);
obstacles = obstacles.filter(o => o.x > -60);

  // Coins
  coinTimer += dt;
  if (coinTimer >= coinInterval) {
    spawnCoin();
    coinTimer = 0;
    coinInterval = 55 + Math.random() * 45;
  }
  coins.forEach(c => c.x -= speed * dt);
  coins = coins.filter(c => c.x > -30);

  // Power-ups
  powerSpawnTimer += dt;
  if (powerSpawnTimer >= powerSpawnInterval) {
    spawnPower();
    powerSpawnTimer = 0;
    powerSpawnInterval = 340 + Math.random() * 120;
  }
  powers.forEach(p => p.x -= speed * dt);
  powers = powers.filter(p => p.x > -30);

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.1 * dt;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Power timer
  if (powerActive) {
    powerTimer -= dt;
    const pct = Math.max(0, (powerTimer / POWER_DURATION) * 100);
    document.getElementById('powerBar').style.width = pct + '%';
    if (powerTimer <= 0) {
      powerActive = false;
      document.getElementById('powerBarWrap').style.display = 'none';
    }
  }

  // Collision: obstacles
  if (!powerActive) {
    for (const o of obstacles) {
      if (rectOverlap(
        cat.x + 20, cat.y + 6, cat.w - 36, cat.h - 10,
        o.x + 2, o.y, o.w - 4, o.h
      )) {
        die();
        return;
      }
    }
  }

  // Collision: coins
  for (const c of coins) {
    if (!c.collected && circleRectOverlap(
      c.x, c.y, c.r * 1.2,
      cat.x + 20, cat.y + 6, cat.w - 36, cat.h - 10
    )) {
      c.collected = true;
      score += 10;
      sfxCoin();
      spawnCollectParticles(c.x, c.y, '#ffd700');
    }
  }

  // Collision: power-ups
  for (const p of powers) {
    if (!p.collected && circleRectOverlap(
      p.x, p.y, p.r * 1.3,
      cat.x + 20, cat.y + 6, cat.w - 36, cat.h - 10
    )) {
      p.collected = true;
      powerActive = true;
      powerTimer = POWER_DURATION;
      sfxPower();
      document.getElementById('powerBarWrap').style.display = 'block';
      spawnCollectParticles(p.x, p.y, '#ffee44');
    }
  }

  // Score increment
  if (Math.floor(frame) % 6 === 0) score += dt * 0.1667;
  score = Math.floor(score);

  if (score > hiScore) hiScore = score;
}

function die() {
  state = 'dead';
  stopMusic();
  sfxDie();
  if (score > hiScore) hiScore = score;
  document.getElementById('startPanel').style.display = 'none';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestScore').textContent = hiScore;
  document.getElementById('gameOverPanel').style.display = 'flex';
  document.getElementById('overlay').style.display = 'flex';
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawPowerOverlay();
  drawObstacles();
  drawCoins();
  drawPowers();
  drawParticles();
  drawKitten();
  drawScore();
}

function loop(timestamp = 0) {
  if (!lastTime) lastTime = timestamp;

  const deltaMs = Math.max(0, timestamp - lastTime);
  lastTime = timestamp;

  let dt = deltaMs / FIXED_STEP;
  dt = Math.min(dt || 1, 2.5);

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  state = 'playing';
  score = 0;
  frame = 0;
  speed = 4.5;
  cat.y = CAT_FLOOR;
  cat.vy = 0;
  cat.jumps = 0;
  obstacles = [];
  coins = [];
  powers = [];
  particles = [];
  obstacleTimer = 0;
  coinTimer = 0;
  powerSpawnTimer = 0;
  powerActive = false;
  powerTimer = 0;
  lastTime = 0;
  document.getElementById('powerBarWrap').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  startMusic();
  obstacleCooldown = 65;
  resetObstacleCooldown();
}

// --- Input ---
function handleJump() {
  if (state === 'playing') jump();
  else if (state === 'idle') startGame();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    handleJump();
  }
});
canvas.addEventListener('click', handleJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleJump(); });

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', function() {
  document.getElementById('gameOverPanel').style.display = 'none';
  startGame();
});
document.getElementById('musicToggle').addEventListener('click', () => {
  musicOn = !musicOn;
  document.getElementById('musicToggle').textContent = musicOn ? '🎵 Music: ON' : '🎵 Music: OFF';
  if (!musicOn) { bgAudio.pause(); } else { bgAudio.play().catch(()=>{}); } 
});
document.getElementById('sfxToggle').addEventListener('click', () => {
  sfxOn = !sfxOn;
  document.getElementById('sfxToggle').textContent = sfxOn ? '🔊 SFX: ON' : '🔊 SFX: OFF';
});


requestAnimationFrame(loop);
</script>

</body>
</html>
